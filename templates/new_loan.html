{% extends "base.html" %}
{% block title %}Apply for Loan — Bank Account Management{% endblock %}

{% block content %}
<nav class="navbar navbar-dark" style="background-color: #1a3c5e;">
    <div class="container">
        <a href="/dashboard" class="navbar-brand fw-semibold">Bank Account Management</a>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4" style="max-width: 500px;">
    <a href="/loans" class="text-muted text-decoration-none" style="font-size: 0.9rem;">&larr; Back to Loans</a>

    <div class="card mt-3 shadow-sm" style="border-radius: 12px; border: none;">
        <div class="card-body p-4">
            <h4 class="mb-3">Apply for a Loan</h4>

            <form method="POST" action="/loans/new">
                <div class="mb-3">
                    <label class="form-label">Loan Amount</label>
                    <input type="number" name="principal" step="0.01" min="1" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Loan Purpose</label>
                    <select name="loan_purpose" class="form-select" required>
                        <option value="Personal">Personal</option>
                        <option value="Auto">Auto</option>
                        <option value="Education">Education</option>
                        <option value="Home Improvement">Home Improvement</option>
                        <option value="Business">Business</option>
                        <option value="Debt Consolidation">Debt Consolidation</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">Submit Application</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
